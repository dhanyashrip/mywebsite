<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Art Store – Checkout</title>

<style>
*{
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f3f3f3;
  margin:0;
  padding:20px;
}

.container{
  max-width:1000px;
  background:#fff;
  margin:auto;
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
  margin-top:30px;
  border-bottom:2px solid #eee;
  padding-bottom:8px;
}

/* PRODUCT */
.product{
  display:flex;
  gap:30px;
}

.price{
  font-size:24px;
  color:#e63946;
  margin:10px 0;
}

.quantity input{
  width:80px;
  padding:6px;
}

.total{
  font-size:22px;
  font-weight:bold;
  margin-top:12px;
  color:#1d3557;
}

/* FORM */
.form-group{
  margin-bottom:15px;
}

label{
  display:block;
  font-weight:bold;
  margin-bottom:5px;
}

input, textarea{
  width:100%;
  padding:10px;
  border-radius:5px;
  border:1px solid #ccc;
}

textarea{
  resize:none;
  height:80px;
}

.row{
  display:flex;
  gap:20px;
}

.row .form-group{
  flex:1;
}

/* PAYMENT */
.payment-box{
    padding:30px;
    width:450px;
    margin:auto;
    border-radius:10px;
}

.payment-option{
    display:flex;
    align-items:center;
    gap:15px;
    font-size:18px;
    margin:18px 0;
    cursor:pointer;
}

.payment-option input{
    width:20px;
    height:20px;
}

.order-btn{
    display:block;
    width:100%;
    margin-top:25px;
    padding:15px;
    background:#243a5e;
    color:white;
    border:none;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
}

.order-btn:hover{
    background:#1b2f4d;
}

/* SUCCESS MESSAGE */
.success-message{
  display:none;
  margin-top:30px;
  padding:18px;
  text-align:center;
  background:#d4edda;
  color:#155724;
  border:1px solid #c3e6cb;
  border-radius:10px;
  font-size:22px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

  <!-- PRODUCT -->
  <div class="product">
    <div>
      <h1>Handmade Sketches and Painting</h1>
      <p>Original canvas artwork</p>

      <div class="price">
        Price: ₹2500
      </div>

      <div class="quantity">
        <label>Quantity</label>
        <input type="number" id="quantity" value="1" min="1">
      </div>

     

    </div>
  </div>

  <!-- PERSONAL -->
  <h2>Personal Details</h2>

  <div class="row">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email">
    </div>
  </div>

  <div class="form-group">
    <label>Phone Number</label>
    <input type="text" id="phone">
  </div>

  <!-- ADDRESS -->
  <h2>Shipping Address</h2>

  <div class="form-group">
    <label>Address</label>
    <textarea id="address"></textarea>
  </div>

  <div class="row">
    <div class="form-group">
      <label>City</label>
      <input type="text" id="city">
    </div>

    <div class="form-group">
      <label>State</label>
      <input type="text" id="state">
    </div>

    <div class="form-group">
      <label>Pincode</label>
      <input type="text" id="pincode">
    </div>
  </div>

  <!-- PAYMENT -->
  <h2>Payment Method</h2>

  <div class="payment-box">

    <label class="payment-option">
      <input type="radio" name="payment" value="UPI">
      UPI / Google Pay / PhonePe
    </label>

    <label class="payment-option">
      <input type="radio" name="payment" value="Card">
      Credit / Debit Card
    </label>

    <label class="payment-option">
      <input type="radio" name="payment" value="COD">
      Cash on Delivery
    </label>

    <button class="order-btn" onclick="placeOrder()">
      Place Order
    </button>

  </div>

  <!-- SUCCESS MESSAGE -->
  <div id="successMessage" class="success-message">
    🎉 Order Placed Successfully!
  </div>

</div>

<script>
const price = 2500;
const quantity = document.getElementById("quantity");
const total = document.getElementById("total");

quantity.addEventListener("input",()=>{
  total.innerText = price * quantity.value;
});

function placeOrder(){

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;

  const payment =
  document.querySelector('input[name="payment"]:checked');

  if(!name || !email || !phone || !address || !payment){
    alert("Please fill all details and select a payment method.");
    return;
  }

  // Show success message
  document.getElementById("successMessage").style.display = "block";

  // Optional: reset form fields
  document.getElementById("name").value="";
  document.getElementById("email").value="";
  document.getElementById("phone").value="";
  document.getElementById("address").value="";
  document.getElementById("city").value="";
  document.getElementById("state").value="";
  document.getElementById("pincode").value="";
  
  document.querySelectorAll('input[name="payment"]').forEach(r=>{
    r.checked=false;
  });

  quantity.value=1;
  total.innerText=2500;
}
</script>

</body>
</html>
