<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sketch Designs for Sale</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        header {
            background: #3a1658eb;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
            text-align: center;
        }

        .price {
            color: #27ae60;
            font-size: 18px;
            margin: 10px 0;
        }

        button {
            background: #000000c9;
            color: #fff;
            border: none;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 8px;
        }

        button:hover {
            background: #444;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #fff;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            border-radius: 8px;
            text-align: center;
        }

        .modal img {
            width: 100%;
            margin-bottom: 15px;
        }

        .close {
            float: right;
            cursor: pointer;
            font-size: 20px;
        }
        
        .more-btn {
    margin: 30px auto;
    display: block;
    background: #222222bd;
    color: #fff;
    padding: 12px 25px;
    font-size: 16px;
    border-radius: 8px;
}
.more-btn:hover {
    background: #444444b3;
}

    </style>
</head>
<body>

<header>
    <h1>Sketches</h1>
    
</header>

<section class="gallery">
    
    <div class="card">
        <img src="img1.jpg" alt="Sketch 1">
        <div class="card-content">
            <h3>Portrait Sketch</h3>
            <p class="price">$25</p>
            <a href="checkout.html">
  <button>Buy Now</button>
</a>
        </div>
    </div>

    <div class="card">
        <img src="img2.jpg" alt="Sketch 2">
        <div class="card-content">
            <h3>Potrait Sketch</h3>
            <p class="price">$30</p>
            <a href="checkout.html">
  <button>Buy Now</button>
</a>
        </div>
    </div>

    <div class="card">
        <img src="img3.jpg" alt="Sketch 3">
        <div class="card-content">
            <h3>Potrait Sketch</h3>
            <p class="price">$40</p>
            <a href="checkout.html">
  <button>Buy Now</button>
</a>
        </div>
        
    </div>
</section>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modalImg">
        <h3>Purchase Sketch</h3>
        <p>Contact artist or proceed to payment</p>
        <button onclick="alert('Payment integration here')">Proceed</button>
    </div>
</div>

<script>
    function openModal(button) {
        const card = button.closest('.card');
        const imgSrc = card.querySelector('img').src;
        document.getElementById('modalImg').src = imgSrc;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }
</script>

</body>
<div style="text-align:center; margin: 20px;">
    <a href="ex.html">
        <button>More</button>
    </a>
</div>
<div style="text-align:left; margin: 20px;">
    <a href="select.html">
        <button>BACK</button>
    </a>
</div>

</html>
