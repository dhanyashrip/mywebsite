<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Select Category</title>

<style>
* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #f1faee, #e5e5e5);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* Container */
.container {
    text-align: center;
}

h1 {
    margin-bottom: 30px;
    color: #1d3557;
}

/* Cards */
.categories {
    display: flex;
    gap: 40px;
}

.card {
    width: 400px;
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    overflow: hidden;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card h2 {
    padding: 15px;
    margin: 0;
    background: #1d3557;
    color: white;
}

/* Back Button */
.back-button {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
}

.back-button a {
    text-decoration: none;
}

.back-button button {
    padding: 12px 30px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #1d3557;
    color: #fff;
    cursor: pointer;
    transition: 0.3s;
}

.back-button button:hover {
    background: #16324f;
    transform: scale(1.05);
}
</style>

</head>

<body>

<div class="container">
    <h1>Select a Category</h1>

    <div class="categories">

        <!-- SKETCHES -->
        <div class="card" onclick="goToCategory('sketches')">
            <img src="3.jpg" alt="Sketches">
            <h2>Sketches</h2>
        </div>

        <!-- PAINTINGS -->
        <div class="card" onclick="goToCategory('paintings')">
            <img src="2.jpg" alt="Paintings">
            <h2>Paintings</h2>
        </div>

    </div>
</div>

<!-- BACK BUTTON (Location Based) -->
<div class="back-button">
    <a href="index.html">
        <button>⬅ Back</button>
    </a>
</div>

<script>
function goToCategory(category) {
    if (category === "sketches") {
        window.location.href = "sketch.html";
    } else if (category === "paintings") {
        window.location.href = "paint.html";
    }
}
</script>

</body>
</html>
